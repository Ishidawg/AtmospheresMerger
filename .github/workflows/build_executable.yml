name: Build Executable

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        pip install pyside6 nuitka

    - name: Build with Nuitka
      run: |
        python -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=pyside6 --windows-console-mode=disable --include-data-dir=assets=assets --windows-icon-from-ico=assets/logo.ico --output-filename=AtmosphereMerger.exe main.py 
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AtmosphereMerger-Windows
        path: main.dist\
